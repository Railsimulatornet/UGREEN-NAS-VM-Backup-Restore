# vm_backup.conf / vm_restore.conf - shared configuration for vm_backup.sh and vm_restore.sh v4.0
# Copyright (c) 2026 Roman Glos for Ugreen NAS Community
#
# DE: Diese Datei wird von vm_backup.sh und vm_restore.sh gemeinsam genutzt.
# EN: This file is shared by vm_backup.sh and vm_restore.sh.

# -----------------------------------------------------------------------------
# Sprache / Language
# -----------------------------------------------------------------------------
# DE: Skriptausgaben und Hinweise. Erlaubt: de oder en.
# EN: Script output and guidance language. Allowed: de or en.
SCRIPT_LANG="de"

# -----------------------------------------------------------------------------
# Pfade / Paths
# -----------------------------------------------------------------------------
# DE: Basisordner für alle VM-Backups.
# EN: Base directory for all VM backups.
BACKUP_ROOT="/volume1/VMBackup"

# DE: Logdatei für vm_backup.sh.
# EN: Log file for vm_backup.sh.
LOG_FILE="/volume1/VMBackup/vm_backup.log"

# DE: Logdatei für vm_restore.sh.
# EN: Log file for vm_restore.sh.
RESTORE_LOG_FILE="/volume1/VMBackup/vm_restore.log"

# DE: Libvirt-URI. Standard ist qemu:///system.
# EN: Libvirt URI. Default is qemu:///system.
LIBVIRT_DEFAULT_URI="qemu:///system"

# -----------------------------------------------------------------------------
# VM-Auswahl / VM selection
# -----------------------------------------------------------------------------
# DE: Leer lassen = alle VMs sichern.
# EN: Leave empty = back up all VMs.
VM_NAMES="Win2022 Windows11"

# DE: Optional direkte Domain-/virName-Werte statt Titel.
# EN: Optional direct domain/virName values instead of titles.
VM_DOMAINS=""

# -----------------------------------------------------------------------------
# Backup-Verhalten / Backup behavior
# -----------------------------------------------------------------------------
# DE: yes = laufende VMs für konsistentes Backup herunterfahren.
# EN: yes = shut down running VMs for a consistent backup.
STOP_VMS="yes"

# DE: yes = nur VMs starten, die vor dem Backup liefen.
# EN: yes = restart only the VMs that were running before the backup.
RESTART_VMS="yes"

# DE: yes = nur die ausgewählten VMs stoppen, no = alle laufenden VMs.
# EN: yes = stop only selected VMs, no = stop all running VMs.
STOP_ONLY_BACKUP_VMS="no"

# DE: Anzahl der aufzubewahrenden Backup-Läufe. 0 = keine automatische Löschung.
# EN: Number of backup runs to keep. 0 = no automatic deletion.
RETENTION_COUNT=4

# -----------------------------------------------------------------------------
# Logrotation / Log rotation
# -----------------------------------------------------------------------------
# DE: Maximale Größe der Backup-Logdatei in MB. 0 = aus.
# EN: Maximum size of the backup log file in MB. 0 = disabled.
LOG_MAX_SIZE_MB=5

# DE: Anzahl alter Logdateien, die behalten werden.
# EN: Number of rotated log files to keep.
LOG_MAX_FILES=5

# -----------------------------------------------------------------------------
# Mail / SMTP
# -----------------------------------------------------------------------------
# DE: Anzeigename des NAS in Betreff und Zusammenfassung.
# EN: Display name of the NAS used in the subject and summary.
NAS_NAME="Ugreen NAS"

# DE: Empfängeradresse für Benachrichtigungen.
# EN: Recipient address for notifications.
SMTP_TO=""

# DE: Absenderadresse.
# EN: Sender address.
SMTP_FROM=""

# DE: SMTP-Server für Python-SMTP-Versand.
# EN: SMTP server for Python SMTP sending.
SMTP_SERVER=""

# DE: SMTP-Port. 587 = STARTTLS, 465 = SSL, 25 = unverschlüsselt.
# EN: SMTP port. 587 = STARTTLS, 465 = SSL, 25 = unencrypted.
SMTP_PORT="587"

# DE: SMTP-Benutzer. Leer lassen, wenn der Server keine Anmeldung braucht.
# EN: SMTP user. Leave empty if the server does not require authentication.
SMTP_USER=""

# DE: SMTP-Passwort. Leer lassen, wenn keine Anmeldung nötig ist.
# EN: SMTP password. Leave empty if authentication is not required.
SMTP_PASS=""

# DE: Mail-Format. Erlaubt: html oder text. html ist der empfohlene Standard.
# EN: Mail format. Allowed: html or text. html is the recommended default.
MAIL_FORMAT="html"

# DE: always = immer, error = nur bei Fehlern, never = nie.
# EN: always = always, error = only on errors, never = never.
MAIL_ON="always"

# DE: Fallback-Sendmail-Binary.
# EN: Fallback sendmail-compatible binary.
SENDMAIL_BIN="/usr/sbin/sendmail"

# -----------------------------------------------------------------------------
# Restore / Restore defaults
# -----------------------------------------------------------------------------
# DE: Standarddauer für den VNC-Guard in Sekunden, wenn --dr verwendet wird.
# EN: Default VNC guard duration in seconds when --dr is used.
DR_DEFAULT_VNC_GUARD_SECS=240
